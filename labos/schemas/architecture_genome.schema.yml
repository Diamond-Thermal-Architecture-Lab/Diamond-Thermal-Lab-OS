$schema: "https://json-schema.org/draft/2020-12/schema"
title: Architecture Genome
type: object
additionalProperties: false
required:
  - route_id
  - route_name
  - heat_source
  - substrate
  - bonding_interface
  - heat_spreader
  - package_path
  - cooling_boundary
  - manufacturing_route
  - validation_method
  - risk_profile
  - maturity_level
  - when_to_use
  - when_not_to_use
properties:
  route_id:
    type: string
  route_name:
    type: string
  heat_source:
    type: string
  substrate:
    type: string
  bonding_interface:
    type: string
  heat_spreader:
    type: string
  package_path:
    type: string
  cooling_boundary:
    type: string
  manufacturing_route:
    type: string
  validation_method:
    type: string
  risk_profile:
    type: array
    items:
      type: string
  maturity_level:
    enum: [concept, candidate, demonstrated, qualified, unknown]
  when_to_use:
    type: string
  when_not_to_use:
    type: string
